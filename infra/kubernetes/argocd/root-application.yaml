apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: amaswarn-project
  namespace: argocd
spec:
  description: "Elite SaaS Architecture Project - Amaswarn"
  sourceRepos:
  - "*"
  destinations:
  - namespace: amaswarn-prod
    server: https://kubernetes.default.svc
  - namespace: amaswarn-staging
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: "*"
    kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amaswarn-root
  namespace: argocd
spec:
  project: amaswarn-project
  source:
    repoURL: https://github.com/nolll77/swarm.git
    targetRevision: HEAD
    path: infra/kubernetes/argocd/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
