apiVersion: v2
name: ai-dev-agent
description: Helm chart for AI Dev Platform Agents (Auto-scaling workers)
type: application
version: 1.0.0
appVersion: "1.0.0"
---
# values.yaml
replicaCount: 3

image:
  repository: ai-dev/agent-worker
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
