apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-coder
  labels:
    app: agent-coder
    tier: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-coder
  template:
    metadata:
      labels:
        app: agent-coder
    spec:
      containers:
        - name: agent-coder
          image: ai-dev/agent-coder:latest
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-dev-secrets
                  key: openai-api-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-dev-secrets
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-dev-secrets
                  key: database-url
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-coder-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-coder
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
