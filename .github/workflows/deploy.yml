name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install

      - name: Build all services (excluding dashboard)
        run: npm run build -- --filter=!dashboard
        continue-on-error: true

      - name: Debug - full tsc output on failure
        if: always()
        run: |
          echo "=== FULL TSC DIAGNOSTICS ==="
          for dir in services/*/; do
            if [ -f "$dir/tsconfig.json" ]; then
              echo ""
              echo "--- $dir ---"
              cd "$dir"
              npx tsc --noEmit --pretty 2>&1 | head -50 || true
              cd -
            fi
          done

      - name: Fail if build failed
        run: npm run build -- --filter=!dashboard

      - name: Run tests on all workspaces (excluding dashboard)
        run: npm test -- --filter=!dashboard

  deploy-dev:
    needs: test
    environment: development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (Dev)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: eu-west-3
      - name: Deploy to ECS (Dev Cluster)
        run: |
          echo "Deploying to Dev environment using Multi-account strategy..."
          # Logic to update ECS services via Terraform or CLI

  deploy-prod:
    needs: deploy-dev
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: eu-west-3
      - name: Deploy to ECS (Prod Cluster)
        run: |
          echo "Deploying to Prod environment across dedicated AWS account..."
