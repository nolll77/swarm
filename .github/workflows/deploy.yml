name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install

      - name: Build all services
        run: npm run build

      - name: Debug - full tsc output on failure
        if: always()
        run: |
          echo "=== FULL TSC DIAGNOSTICS ==="
          for dir in services/*/; do
            if [ -f "$dir/tsconfig.json" ]; then
              echo ""
              echo "--- $dir ---"
              cd "$dir"
              npx tsc --noEmit --pretty 2>&1 | head -50 || true
              cd -
            fi
          done

      - name: Fail if build failed
        run: npm run build

      - name: Run tests on all workspaces
        run: npm test

  deploy-dev:
    needs: test
    environment: development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mock AWS Configuration (Dev)
        run: |
          echo "Skipped AWS configure: AWS_ACCESS_KEY_ID_DEV not yet set in Github Secrets"
      - name: Deploy to ECS (Dev Cluster)
        run: |
          echo "Deploying to Dev environment using Multi-account strategy (MOCKED)..."

  deploy-prod:
    needs: deploy-dev
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mock AWS Configuration (Prod)
        run: |
          echo "Skipped AWS configure: AWS_ACCESS_KEY_ID_PROD not yet set in Github Secrets"
      - name: Deploy to ECS (Prod Cluster)
        run: |
          echo "Deploying to Prod environment across dedicated AWS account (MOCKED)..."
